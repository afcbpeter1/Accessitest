# Azure DevOps Jira pipeline for A11ytest.ai
trigger:
  branches:
    include:
      - main
      - master
      - unit-testing-pipeline
      - develop
  paths:
    exclude:
      - '**.md'
      - 'docs/**'

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: a11ytest-secrets   # contains A11YTEST_API_KEY
  - name: nodeVersion
    value: '18.x'
  - name: ciUserId
    value: '8a9b6d94-b39c-4384-98ce-d889ce118363'

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: '$(nodeVersion)'
    displayName: 'Install Node.js'

  - script: npm ci
    displayName: 'npm ci'

  - script: npm run type-check
    displayName: 'TypeScript check'

  - script: npm run lint
    displayName: 'Lint'

  - script: npm run build:next
    displayName: 'Build'
    env:
      CI: true

  - script: |
      set -e
      RESP=$(curl -s -w "\n%{http_code}" -X POST https://a11ytest.ai/api/ci/scan \
        -H "Authorization: Bearer $(A11YTEST_API_KEY)" \
        -H "Content-Type: application/json" \
        -d '{
          "urls": [
            "https://a11ytest.ai",
            "https://a11ytest.ai/playground",
            "https://a11ytest.ai/logo-contrast-checker",
            "https://a11ytest.ai/a11y",
            "https://a11ytest.ai/privacy-policy",
            "https://a11ytest.ai/terms-of-service",
            "https://a11ytest.ai/cookie-policy",
            "https://a11ytest.ai/accessibility-statement"
          ]
        }')
      HTTP_CODE=$(echo "$RESP" | tail -n1)
      echo "$RESP" | sed '$d' > scan-result.json
      echo "--- Scan result (HTTP $(echo $HTTP_CODE)) ---"
      python3 -c "
      import json
      d = json.load(open('scan-result.json'))
      print('Overall passed:', d.get('passed'))
      print('Report URL:', d.get('reportUrl') or (d.get('results', [{}]) or [{}])[0].get('reportUrl', ''))
      "
      if [ "$HTTP_CODE" != "200" ]; then
        echo "##vso[task.logissue type=error]Accessibility scan API returned HTTP $HTTP_CODE"
        exit 1
      fi
    displayName: 'Run a11ytest.ai Accessibility Scan'

  - script: |
      set -e
      python3 -c "
      import json
      d = json.load(open('scan-result.json'))
      issues = []
      for r in d.get('results', []) or []:
          page_url = r.get('url', '') or ''
          for issue in (r.get('issues', []) or []):
              issue['url'] = page_url
              issues.append(issue)
      with open('backlog-issues.json','w') as f:
          json.dump({ 'userId': '$(ciUserId)', 'issues': issues }, f)
      print(f'Extracted {len(issues)} issues for backlog add')
      "
      RESP=$(curl -s -w "\n%{http_code}" -X POST https://a11ytest.ai/api/ci/backlog-add \
        -H "Authorization: Bearer $(A11YTEST_API_KEY)" \
        -H "Content-Type: application/json" \
        -d @backlog-issues.json)
      HTTP_CODE=$(echo "$RESP" | tail -n1)
      BODY=$(echo "$RESP" | sed '$d')
      echo "--- Backlog add response (HTTP $(echo $HTTP_CODE)) ---"
      echo "$BODY"
      if [ "$HTTP_CODE" != "200" ]; then
        echo "##vso[task.logissue type=error]Backlog add API returned HTTP $HTTP_CODE"
        exit 1
      fi
    displayName: 'Add CI scan issues to product backlog'

  - script: |
      set -e
      RESP=$(curl -s -w "\n%{http_code}" -X POST https://a11ytest.ai/api/ci/jira-add \
        -H "Authorization: Bearer $(A11YTEST_API_KEY)" \
        -H "Content-Type: application/json" \
        -d @backlog-issues.json)
      HTTP_CODE=$(echo "$RESP" | tail -n1)
      BODY=$(echo "$RESP" | sed '$d')
      echo "--- Jira add response (HTTP $(echo $HTTP_CODE)) ---"
      echo "$BODY"
      echo "$BODY" > jira-add-result.json
      if [ "$HTTP_CODE" != "200" ]; then
        echo "##vso[task.logissue type=error]Jira add API returned HTTP $HTTP_CODE"
        exit 1
      fi
      python3 -c "
      import json
      jr = json.load(open('jira-add-result.json'))
      print(f\"Jira Created: {jr.get('createdCount', 0)} | Skipped: {jr.get('skippedCount', 0)} | Errors: {jr.get('errorCount', 0)}\")
      for item in (jr.get('created', []) or []):
        print(f\"  Ticket: {item.get('ticketKey')} -> {item.get('ticketUrl')}\")
      "
    displayName: 'Add CI scan issues to Jira backlog'

  - script: |
      set -e
      PASSED=$(python3 -c "import json; d=json.load(open('scan-result.json')); print(d.get('passed', False))")
      echo "Overall passed: $PASSED"
      python3 -c "
      import json
      d = json.load(open('scan-result.json'))
      for r in d.get('results', []):
        status = 'PASS' if r.get('passed') else 'FAIL'
        url = r.get('url', '')
        report_url = r.get('reportUrl', '')
        summary = r.get('summary', {})
        print(f\"  {status}: {url}\")
        if report_url:
          print(f\"    Report: {report_url}\")
        if summary:
          print(f\"    Issues: {summary.get('total', 0)} total (critical={summary.get('critical', 0)}, serious={summary.get('serious', 0)})\")
      "
      if [ "$PASSED" != "True" ]; then
        echo "##vso[task.logissue type=error]Accessibility scan failed: one or more pages have critical/serious issues."
        exit 1
      fi
    displayName: 'Check accessibility scan result'

