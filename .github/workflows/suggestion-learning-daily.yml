# Runs the suggestion-learning job daily (server-side).
# Reads pipeline_suggestion_log, calls Claude to improve suggestions, writes to learned_suggestions.
# Requires repo secrets: CRON_SECRET (same value as your app env). Optional: APP_URL (default https://a11ytest.ai).
name: Suggestion learning (daily)

on:
  schedule:
    # Daily at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  learn:
    runs-on: ubuntu-latest
    steps:
      - name: Call suggestion-learning endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET repo secret is not set. Add it in Settings > Secrets and variables > Actions."
            exit 1
          fi
          resp=$(curl -s -w "\n%{http_code}" -X POST "https://a11ytest.ai/api/cron/suggestion-learning" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json")
          code=$(echo "$resp" | tail -n1)
          body=$(echo "$resp" | sed '$d')
          echo "$body" | head -c 500
          echo ""
          if [ "$code" != "200" ]; then
            echo "::error::suggestion-learning returned HTTP $code"
            exit 1
          fi
          echo "OK (HTTP 200)"
