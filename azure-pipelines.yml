# Azure DevOps pipeline for A11ytest.ai
trigger:
  branches:
    include:
      - main
      - master
      - unit-testing-pipeline
      - develop
  paths:
    exclude:
      - '**.md'
      - 'docs/**'

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: a11ytest-secrets   # ← Library group containing A11YTEST_API_KEY
  - name: nodeVersion
    value: '18.x'

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: '$(nodeVersion)'
    displayName: 'Install Node.js'

  - script: npm ci
    displayName: 'npm ci'

  - script: npm run type-check
    displayName: 'TypeScript check'

  - script: npm run lint
    displayName: 'Lint'

  - script: npm run build:next
    displayName: 'Build'
    env:
      CI: true

  # ── Accessibility scanning ──────────────────────────────────────────────────

  - script: |
      curl -s -X POST https://a11ytest.ai/api/ci/scan \
        -H "Authorization: Bearer $(A11YTEST_API_KEY)" \
        -H "Content-Type: application/json" \
        -d '{
          "urls": [
            "https://a11ytest.ai",
            "https://a11ytest.ai/playground",
            "https://a11ytest.ai/logo-contrast-checker",
            "https://a11ytest.ai/accessibility-issues"
          ]
        }' \
        -o scan-result.json
      echo "--- Raw scan result ---"
      cat scan-result.json
    displayName: 'Run a11ytest.ai Accessibility Scan'

  - script: |
      PASSED=$(python3 -c "import sys,json; d=json.load(open('scan-result.json')); print(d['passed'])")
      REPORT=$(python3 -c "