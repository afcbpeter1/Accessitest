# Azure DevOps pipeline for A11ytest.ai
# Connect this repo (GitHub) in Pipelines → Create Pipeline → GitHub → select repo
trigger:
  branches:
    include:
      - main
      - master
      - unit-testing-pipeline
      - develop
  paths:
    exclude:
      - '**.md'
      - 'docs/**'

pool:
  vmImage: 'ubuntu-latest'

variables:
  nodeVersion: '18.x'

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: '$(nodeVersion)'
    displayName: 'Install Node.js'

  - script: npm ci
    displayName: 'npm ci'

  - script: npm run type-check
    displayName: 'TypeScript check'

  - script: npm run lint
    displayName: 'Lint'

  - script: npm run build:next
    displayName: 'Build'
    env:
      CI: true
