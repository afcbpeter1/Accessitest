<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AccessScan</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; position: relative; }
    #app-iframe { width: 100%; height: 100%; border: none; display: block; }
    #focus-reader-toggle {
      position: absolute;
      top: 8px;
      right: 8px;
      z-index: 20;
      display: inline-block;
      border: none;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      color: #ffffff;
      background: #6b7280;
    }
    #focus-reader-toggle.on {
      background: #2563eb;
    }
    #focus-reader-toggle:disabled {
      opacity: 0.9;
      cursor: not-allowed;
    }
    #scan-overlay {
      display: none;
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255,255,255,0.85);
      z-index: 10;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      text-align: center;
    }
    #scan-overlay.visible { display: flex; pointer-events: auto; }
    #scan-overlay:not(.visible) { pointer-events: none; }
    #scan-overlay .title { font-size: 1rem; font-weight: 600; color: #1e3a5f; margin-bottom: 0.5rem; }
    #scan-overlay .progress-bar { width: 100%; max-width: 240px; height: 8px; background: #e5e7eb; border-radius: 4px; overflow: hidden; margin: 0.5rem 0; }
    #scan-overlay .progress-fill { height: 100%; background: #2563eb; border-radius: 4px; transition: width 0.2s; width: 0%; }
    #scan-overlay .url { font-size: 0.75rem; color: #4b5563; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  </style>
</head>
<body>
  <button id="focus-reader-toggle" type="button" aria-pressed="false">Reader: Off</button>
  <iframe id="app-iframe" title="AccessScan app"></iframe>
  <div id="scan-overlay" aria-live="polite">
    <span class="title" id="scan-overlay-title">Scanning…</span>
    <div class="progress-bar" id="scan-progress-bar"><div class="progress-fill" id="scan-progress-fill"></div></div>
    <span class="url" id="scan-overlay-url"></span>
  </div>
  <script src="sidepanel.js"></script>
</body>
</html>
